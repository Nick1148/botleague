<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>봇 실험실 — 귀여움 관문 v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>body{background:#FFF6E9;margin:0;font-family:Pretendard,sans-serif}canvas{display:block;margin:0 auto;max-width:100%}</style>
</head>
<body>
<canvas id="lab" width="1080" height="2150"></canvas>
<script type="module">
import { createBot } from "./src/bot.js";
import { drawBot } from "./src/renderer.js";
import { allNpcs } from "./src/npc.js";

// 상단: NPC 24마리 (성격→외형·배색 다양성 관문)
// 중단: 표정 5종 상태머신
// 하단: 같은 봇의 매치업 프리뷰 (전투 자세)
const STATES = ["idle", "battle", "win", "lose", "interview"];
const ctx = document.getElementById("lab").getContext("2d");
const bots = allNpcs().slice(0, 24);

function frame(t) {
  ctx.clearRect(0, 0, 1080, 2150);
  ctx.fillStyle = "#33302B";
  ctx.font = "bold 34px Pretendard, sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("① 다양성 관문 — 24마리가 다 달라 보이는가", 40, 60);

  bots.forEach((bot, i) => {
    const x = 135 + (i % 4) * 270;
    const y = 200 + Math.floor(i / 4) * 250;
    drawBot(ctx, bot, { x, y, size: 150, state: "idle", t: t + i * 230 });
    ctx.fillStyle = "#33302B"; ctx.font = "bold 22px Pretendard, sans-serif"; ctx.textAlign = "center";
    ctx.fillText(bot.name, x, y + 115);
  });

  ctx.textAlign = "left";
  ctx.font = "bold 34px Pretendard, sans-serif";
  ctx.fillText("② 표정 상태머신", 40, 1720);
  const demo = createBot("뭉치", "겁이 많지만 돈이 걸리면 목숨을 건다");
  STATES.forEach((s, i) => {
    const x = 110 + i * 215;
    drawBot(ctx, demo, { x, y: 1830, size: 150, state: s, t });
    ctx.fillStyle = "#33302B"; ctx.font = "20px Pretendard, sans-serif"; ctx.textAlign = "center";
    ctx.fillText(s, x, 1945);
  });

  ctx.textAlign = "left";
  ctx.font = "bold 34px Pretendard, sans-serif";
  ctx.fillText("③ 대전 프리뷰", 40, 2010);
  const a = createBot("돌진맨", "일단 부딪히고 생각한다");
  const b = createBot("여우코어", "몰래 뒤에서 치는 게 특기다");
  drawBot(ctx, a, { x: 380, y: 2090, size: 130, state: "battle", t });
  drawBot(ctx, b, { x: 700, y: 2090, size: 130, state: "battle", t, flip: true });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
