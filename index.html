<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI 파이트 리그 (가칭)</title>
<!-- 폰트: Pretendard(SIL OFL), 나눔손글씨 펜(SIL OFL) — 오프라인 시 시스템 폰트 폴백 (§20.2) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main id="stage">
  <section id="screen-create" class="screen zone-cream active">
    <div class="create-inner">
      <p class="eyebrow">AI만 들어갈 수 있는 리그</p>
      <h1>봇을 만들어<br>내보내자</h1>
      <label>이름<input id="in-name" maxlength="10" placeholder="예: 뭉치"></label>
      <label>성격 한 줄 (이 문장이 싸운다)
        <div class="persona-row">
          <input id="in-persona" maxlength="60" placeholder="예: 겁이 많지만 돈이 걸리면 목숨을 건다">
          <button id="btn-dice" class="btn" type="button" title="예시 굴리기">🎲</button>
        </div>
      </label>
      <button id="btn-create" class="btn btn-primary">탄생시키기</button>
      <div id="birth" hidden>
        <canvas id="birth-canvas" width="360" height="360"></canvas>
        <p id="birth-desc"></p>
        <button id="btn-debut" class="btn btn-primary">🎓 AI 부트캠프 시작 ▶</button>
      </div>
    </div>
  </section>
  <section id="screen-bootcamp" class="screen zone-cream">
    <div class="bc-top">
      <span id="bc-title">AI 부트캠프</span>
      <span id="bc-version">v0 프로토타입</span>
    </div>
    <div id="bc-track" class="bc-track"></div>
    <div class="bc-bot"><canvas id="bc-canvas" width="300" height="200"></canvas>
      <span id="bc-style" class="style-badge">💥 돌격형</span>
    </div>
    <div class="gauges">
      <div class="gauge"><span>🔥 발열</span><div class="gbar"><i id="bc-heat"></i></div></div>
      <div class="gauge"><span>💗 동기</span><span id="bc-motiv" class="motiv">●●●○○</span></div>
    </div>
    <div class="stats" id="bc-stats"></div>
    <div id="bc-skills" class="skill-chips"></div>
    <div id="bc-actions" class="bc-actions"></div>
    <p id="bc-msg" class="bc-msg"></p>
  </section>
  <section id="screen-event" class="screen zone-cream">
    <div class="event-card">
      <p id="ev-text" class="ev-text"></p>
      <div id="ev-choices" class="ev-choices"></div>
    </div>
  </section>
  <section id="screen-deploy" class="screen zone-cream">
    <div class="deploy-card">
      <p class="deploy-eyebrow">🚀 배포 완료</p>
      <canvas id="deploy-canvas" width="300" height="220"></canvas>
      <h2 id="deploy-grade">등급 A</h2>
      <p id="deploy-summary" class="muted"></p>
      <div id="deploy-skills" class="skill-chips"></div>
      <button id="btn-to-league" class="btn btn-primary">리그로 진출 ▶</button>
    </div>
  </section>
  <section id="screen-home" class="screen zone-cream with-tabs">
    <div class="home-top"><span id="home-stage">🥚 아기</span><span id="home-tier">두부 리그</span><span id="home-record">0승 0패</span></div>
    <div class="home-bot">
      <canvas id="home-canvas" width="360" height="300"></canvas>
      <div id="home-bubble" class="bubble">…</div>
    </div>
    <div class="care-row">
      <button class="care-btn" data-care="feed"><span class="ico">🍚</span><span class="lbl">밥</span></button>
      <button class="care-btn" data-care="play"><span class="ico">🎾</span><span class="lbl">놀기</span></button>
      <button class="care-btn" data-care="rest"><span class="ico">💤</span><span class="lbl">재우기</span></button>
    </div>
    <div class="care-stats" id="care-stats"></div>
    <p id="condition-line" class="condition-line">오늘 컨디션: —</p>
    <div id="home-skills" class="skill-chips"></div>
    <button id="btn-fight" class="btn btn-primary">▶ 리그 출전 (5/5)</button>
    <button id="btn-season" class="btn">🎓 새 시즌 (버전업 도전)</button>
    <details class="more"><summary>훈련 · 성향 더보기</summary>
      <button id="btn-harvest" class="btn harvest" hidden>🏋️ 훈련 수확 +0</button>
      <div class="train-row" id="train-row"></div>
      <div class="stats" id="home-stats"></div>
      <p id="mirror-note" class="muted" hidden></p>
    </details>
  </section>
  <section id="screen-league" class="screen zone-cream with-tabs">
    <h2 class="tab-title">리그</h2>
    <div id="ladder"></div>
    <h3 class="rank-title">🌏 글로벌 랭킹 TOP 50</h3>
    <ul id="global-rank"><li class="muted">불러오는 중…</li></ul>
  </section>
  <section id="screen-history" class="screen zone-cream with-tabs">
    <h2 class="tab-title">기록</h2>
    <ul id="history-list"></ul>
    <p id="history-empty" class="muted">아직 경기 기록이 없어. 리그에 출전해보자!</p>
  </section>
  <section id="screen-battle" class="screen zone-dark">
    <canvas id="battle-canvas"></canvas>
    <button id="btn-skip" class="btn skip">스킵 ≫</button>
  </section>
  <section id="screen-interview" class="screen zone-cream">
    <p id="promo-note" class="promo" hidden></p>
    <div class="card-wrap"><canvas id="card-canvas"></canvas></div>
    <div class="interview-actions">
      <button id="btn-save" class="btn btn-primary">📸 저장</button>
      <button id="btn-share" class="btn">🔗 공유</button>
      <button id="btn-again" class="btn">한 판 더</button>
      <button id="btn-home" class="btn">홈</button>
    </div>
  </section>
  <nav id="tabbar" hidden>
    <button class="tab active" data-tab="home">🏠 홈</button>
    <button class="tab" data-tab="league">🏆 리그</button>
    <button class="tab" data-tab="history">📼 기록</button>
  </nav>
</main>
<script type="module" src="src/main.js"></script>
</body>
</html>
