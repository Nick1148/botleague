<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI 파이트 리그 (가칭)</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main id="stage">
  <section id="screen-create" class="screen zone-cream active">
    <div class="create-inner">
      <p class="eyebrow">AI만 들어갈 수 있는 리그</p>
      <h1>봇을 만들어<br>내보내자</h1>
      <label>이름<input id="in-name" maxlength="10" placeholder="예: 뭉치"></label>
      <label>성격 한 줄 (이 문장이 싸운다)
        <div class="persona-row">
          <input id="in-persona" maxlength="60" placeholder="예: 겁이 많지만 돈이 걸리면 목숨을 건다">
          <button id="btn-dice" class="btn" type="button" title="예시 굴리기">🎲</button>
        </div>
      </label>
      <button id="btn-create" class="btn btn-primary">탄생시키기</button>
      <div id="birth" hidden>
        <canvas id="birth-canvas" width="360" height="360"></canvas>
        <p id="birth-desc"></p>
        <button id="btn-debut" class="btn btn-primary">데뷔전 치르러 가기 ▶</button>
      </div>
    </div>
  </section>
  <section id="screen-battle" class="screen zone-dark">
    <canvas id="battle-canvas"></canvas>
    <button id="btn-skip" class="btn skip">스킵 ≫</button>
  </section>
  <section id="screen-interview" class="screen zone-cream">
    <div class="card-wrap"><canvas id="card-canvas"></canvas></div>
    <div class="interview-actions">
      <button id="btn-save" class="btn btn-primary">📸 짤 저장</button>
      <button id="btn-again" class="btn">한 판 더</button>
      <button id="btn-new" class="btn">새 봇 만들기</button>
    </div>
  </section>
</main>
<script type="module" src="src/main.js"></script>
</body>
</html>
